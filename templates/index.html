<!DOCTYPE html>

<html>
<head>
    <title>AI Shopping</title>
    <style>
        body {
            font-family: Arial;
            margin: 30px;
            background-color: #f5f5f5;
        }

    h2 {
        text-align: center;
    }

    form {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        padding: 10px;
        width: 300px;
        border-radius: 5px;
        border: 1px solid #ccc;
    }

    button {
        padding: 10px 15px;
        border: none;
        background-color: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background-color: #0056b3;
    }

    .grid {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
    }

    .card {
        background: white;
        width: 220px;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        text-align: center;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
        transform: scale(1.05);
        box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .card img {
        width: 180px;
        height: 200px;
        object-fit: cover;
        border-radius: 8px;
    }

    .card h4 {
        height: 50px;
        overflow: hidden;
        font-size: 14px;
    }

    .price {
        color: green;
        font-weight: bold;
    }

    .no-results {
        text-align: center;
        font-size: 18px;
        margin-top: 20px;
    }
</style>
```

</head>
<body>

<h2>🛒 AI Product Search</h2>

<form method="GET">
    <input type="text" name="query" placeholder="Search products..." value="{{ request.GET.query }}">
    <button type="submit">Search</button>
</form>

<hr>

<div class="grid">
    {% if results %}
        {% for item in results %}
            <div class="card">

```
            <img src="{{ item.img }}" alt="product">

            <h4>{{ item.name }}</h4>

            <p class="price">₹{{ item.price }}</p>

        </div>
    {% endfor %}
{% else %}
    <p class="no-results">No results found</p>
{% endif %}
```

</div>

</body>
</html>
